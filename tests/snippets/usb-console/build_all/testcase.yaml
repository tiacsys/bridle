##############################################################################
###
### ATTENTION:
###
### This test suite will be controlled by the standard integration platforms
### and must be invoked with the corresponding quarantine list. Otherwise,
### many board-shield constellations will terminate with an error.
###
###     west twister -G --quarantine-list bridle/tests/quarantine.yaml … … …
###
##############################################################################
common:
  tags:
    - base
    - snippets
    - usb-console
    - usb
  sysbuild: false
  build_only: true
  build_on_all: true
  filter: CONFIG_USB_DEVICE_STACK_NEXT and CONFIG_USBD_CDC_ACM_CLASS and
          dt_compat_enabled("zephyr,cdc-acm-uart") and
          dt_chosen_enabled("zephyr,console")
  # platform_exclude:
  #
  # AVOID `platform_exclude` statement here in the `common` section!
  #   USE the `tests/quarantine.yaml`file instead.
  #
  platform_allow:
    - native_sim
    - native_sim/native/64
    - arduino_zero/samd21g18a
    - arduino_zero/samd21g18a/bbe
    - coffeecaller_nrf52
    - cytron_maker_nano_rp2040
    - cytron_maker_pi_rp2040
    - cytron_motion_2350_pro/rp2350a/hazard3
    - cytron_motion_2350_pro/rp2350a/m33
    - magpie_f777ni
    - mimxrt1010_evk/mimxrt1011
    - mimxrt1010_evk/mimxrt1011/bbe
    - mimxrt1060_evk@A/mimxrt1062/qspi
    - mimxrt1060_evk@A/mimxrt1062/qspi/bbe
    - mimxrt1060_evk@B/mimxrt1062/qspi
    - mimxrt1060_evk@B/mimxrt1062/qspi/bbe
    - mimxrt1060_evk@C/mimxrt1062/qspi
    - mimxrt1060_evk@C/mimxrt1062/qspi/bbe
    - mimxrt1060_evk@C/mimxrt1062/hyperflash
    - mimxrt1060_evk@C/mimxrt1062/hyperflash/bbe
    - mimxrt1170_evk@A/mimxrt1176/cm7
    - mimxrt1170_evk@B/mimxrt1176/cm7
    - mini_usb_rp2040
    - mini_usb_rp2040@16mb
    - mini_usb_rp2040@chipled
    - mini_usb_rp2350/rp2350a/m33
    - mini_usb_rp2350@16mb/rp2350a/m33
    - nucleo_f413zh/stm32f413xx
    - nucleo_f413zh/stm32f413xx/bbe
    - nucleo_f746zg/stm32f746xx
    - nucleo_f746zg/stm32f746xx/bbe
    - nucleo_f767zi/stm32f767xx
    - nucleo_f767zi/stm32f767xx/bbe
    - nucleo_l496zg/stm32l496xx
    - nucleo_l496zg/stm32l496xx/bbe
    - picoboy/rp2040
    - picoboy_color/rp2040
    - picoboy_color_plus/rp2350a/m33
    - rpi_pico/rp2040
    - rpi_pico/rp2040/bbe
    - rpi_pico/rp2040/mcuboot
    - rpi_pico/rp2040/mcuboot/bbe
    - rpi_pico/rp2040/w
    - rpi_pico/rp2040/w/bbe
    - rpi_pico/rp2040/w/mcuboot
    - rpi_pico/rp2040/w/mcuboot/bbe
    - rpi_pico2/rp2350a/hazard3
    - rpi_pico2/rp2350a/hazard3/bbe
    - rpi_pico2/rp2350a/m33
    - rpi_pico2/rp2350a/m33/bbe
    - rpi_pico2/rp2350a/m33/mcuboot
    - rpi_pico2/rp2350a/m33/mcuboot/bbe
    - rpi_pico2/rp2350a/m33/w
    - rpi_pico2/rp2350a/m33/w/bbe
    - rpi_pico2/rp2350a/m33/w/mcuboot
    - rpi_pico2/rp2350a/m33/w/mcuboot/bbe
    - seeeduino_cm0/samd21g18a
    - seeeduino_lotus/samd21g18a
    - seeeduino_xiao/samd21g18a
    - seeeduino_xiao/samd21g18a/bbe
    - xiao_samd21/samd21g18a
    - xiao_rp2040
    - xiao_rp2350/rp2350a/hazard3
    - xiao_rp2350/rp2350a/m33
