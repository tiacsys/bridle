properties:

  reset-gpios:
    required: true
    type: phandle-array
    description: Reset pin.

  interrupt-gpios:
    required: true
    type: phandle-array
    description: Interrupt pin.
  
  bus-select-gpios:
    required: true
    type: phandle-array
    description: Bus select pin.

  clock:
    required: true
    type: phandle

  "#address-cells":
    required: true
    const: 1

  "#size-cells":
    required: true
    const: 0

bus: nxp,sc16is75x
