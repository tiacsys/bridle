sample:
  description: demonstrating how to integrate a u-blox GNSS device
    into a Zephyr application
  name: ubxlib gnss
common:
  tags:
    - bridle
    - ubxlib
  sysbuild: false
  platform_exclude:
    - nucleo_f303re/stm32f303xe
    - nucleo_f401re/stm32f401xe
  platform_allow:
    - mimxrt1010_evk
    - mimxrt1060_evk@A/mimxrt1062/qspi
    - mimxrt1060_evk@B/mimxrt1062/qspi
    - mimxrt1060_evk@C/mimxrt1062/qspi
    - mimxrt1060_evk@C/mimxrt1062/hyperflash
    - mimxrt1170_evk@A/mimxrt1176/cm7
    - mimxrt1170_evk@B/mimxrt1176/cm7
    - nrf52840dk/nrf52840
    - nrf9160dk/nrf9160
    - nucleo_f303re/stm32f303xe/bbe
    - nucleo_f401re/stm32f401xe/bbe
    - nucleo_f413zh/stm32f413xx
    - nucleo_f413zh/stm32f413xx/bbe
    - nucleo_f746zg/stm32f746xx
    - nucleo_f746zg/stm32f746xx/bbe
    - nucleo_f767zi/stm32f767xx
    - nucleo_f767zi/stm32f767xx/bbe
    - nucleo_l496zg
  integration_platforms:
    - mimxrt1010_evk
    - mimxrt1060_evk@A/mimxrt1062/qspi
    - mimxrt1060_evk@B/mimxrt1062/qspi
    - mimxrt1060_evk@C/mimxrt1062/qspi
    - mimxrt1060_evk@C/mimxrt1062/hyperflash
    - mimxrt1170_evk@A/mimxrt1176/cm7
    - mimxrt1170_evk@B/mimxrt1176/cm7
    - nrf52840dk/nrf52840
    - nrf9160dk/nrf9160
    - nucleo_f303re/stm32f303xe/bbe
    - nucleo_f401re/stm32f401xe/bbe
    - nucleo_f413zh/stm32f413xx
    - nucleo_f413zh/stm32f413xx/bbe
    - nucleo_f746zg/stm32f746xx
    - nucleo_f746zg/stm32f746xx/bbe
    - nucleo_f767zi/stm32f767xx
    - nucleo_f767zi/stm32f767xx/bbe
    - nucleo_l496zg
tests:
  bridle.sample.ubx_gnss.release:
    build_only: true
    build_on_all: true
    extra_args: CMAKE_BUILD_TYPE=ZRelease
  bridle.sample.ubx_gnss.debug:
    build_only: true
    build_on_all: true
    extra_args: CMAKE_BUILD_TYPE=ZDebug
