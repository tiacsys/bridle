# increases the RTC initialization priority
# as the board has enabled the SNVS counter_rtc
CONFIG_RTC_INIT_PRIORITY=70

# disable unsupported components or components with issues
# zephyr-keep-sorted-start
CONFIG_FLASH=n
CONFIG_FLASH_SHELL=n
# zephyr-keep-sorted-stop
